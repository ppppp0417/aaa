                });
            });
        }

        function addManualEntry(content) {
            const newId = generateId();
            let latestPresetIndex;
            if (currentRound === 0) {
                latestPresetIndex = 1;
            } else {
                latestPresetIndex = 1 + currentRound;
            }
            manualEntries.push({
                id: newId,
                content: content,
                afterRound: latestPresetIndex
            });
            refreshContent();
        }

        function removeManualEntry(id) {
            manualEntries = manualEntries.filter(e => e.id !== id);
            refreshContent();
        }

        async function handlePresetChoice(optionText) {
            if (storyEnded || currentRound >= 5) {
                alert("故事已结局，请点击「重读本书」开启新旅程。");
                return;
            }
            const interactionDiv = document.getElementById('interactionArea');
            let loadSpan = null;
            if (interactionDiv) {
                loadSpan = document.createElement('div');
                loadSpan.className = "loading";
                loadSpan.innerText = "⏳ 主线剧情推进中...";
                interactionDiv.appendChild(loadSpan);
            }
            try {
                if (currentRound === 0 && !currentBranchKey) {
                    currentBranchKey = optionText;
                    currentBranchRounds = currentBook.branches[currentBranchKey].rounds;
                    const firstRoundData = currentBranchRounds[0];
                    presetStory.push(firstRoundData.content);
                    currentRound = 1;
                    refreshContent();
                    if(loadSpan) loadSpan.remove();
                    return;
                }
                if (currentRound >= 1 && currentRound <= 4 && currentBranchRounds && currentBranchRounds[currentRound]) {
                    const roundData = currentBranchRounds[currentRound];
                    presetStory.push(roundData.content);
                    currentRound++;
                    refreshContent();
                    if(loadSpan) loadSpan.remove();
                } else {
                    if(loadSpan) loadSpan.remove();
                    alert("无法继续推进剧情。");
                }
            } catch(e) {
                console.warn(e);
                if(loadSpan) loadSpan.remove();
                alert("剧情推进失败，请重试");
            }
        }

        document.getElementById('fontPlusBtn')?.addEventListener('click', () => { currentFontSize = Math.min(26, currentFontSize+2); readingArea.style.fontSize = currentFontSize+"px"; });
        document.getElementById('fontMinusBtn')?.addEventListener('click', () => { currentFontSize = Math.max(12, currentFontSize-2); readingArea.style.fontSize = currentFontSize+"px"; });
        document.getElementById('bgLightBtn')?.addEventListener('click', () => { readingArea.style.background = "#fffdf9"; readingArea.style.color = "#1e2a3e"; });
        document.getElementById('bgSepiaBtn')?.addEventListener('click', () => { readingArea.style.background = "#fbf7e9"; readingArea.style.color = "#3b2e24"; });
        document.getElementById('saveVersionBtn')?.addEventListener('click', () => {
            const saveData = { 
                bookId: currentBook.id, 
                presetStory, 
                manualEntries,
                currentRound, 
                storyEnded, 
                currentBranchKey,
                savedAt: new Date().toISOString() 
            };
            localStorage.setItem(`interact_save_${currentBook.id}`, JSON.stringify(saveData));
            alert("当前版本已保存！");
        });
        document.getElementById('resetBookBtn')?.addEventListener('click', () => {
            if(confirm("重置本书将丢失未保存的进度，是否重新开始？")) {
                initBookSession(currentBook, true);
            }
        });

        refreshContent();
    }

    function initBookSession(book, reset = false) {
        currentBook = book;
        const saved = localStorage.getItem(`interact_save_${book.id}`);
        if (!reset && saved) {
            try {
                const data = JSON.parse(saved);
                if (data.bookId === book.id) {
                    presetStory = data.presetStory || [book.initialSegments[0], book.initialSegments[1]];
                    manualEntries = data.manualEntries || [];
                    currentRound = data.currentRound;
                    storyEnded = data.storyEnded || false;
                    currentBranchKey = data.currentBranchKey;
                    if (currentBranchKey) {
                        currentBranchRounds = book.branches[currentBranchKey]?.rounds;
                    }
                    renderReader(book);
                    return;
                }
            } catch(e) {}
        }
        presetStory = [book.initialSegments[0], book.initialSegments[1]];
        manualEntries = [];
        currentRound = 0;
        storyEnded = false;
        currentBranchKey = null;
        currentBranchRounds = null;
        renderReader(book);
    }

    function renderLibrary() {
        const grid = document.getElementById('bookGrid');
        if (!grid) return;
        grid.innerHTML = "";
        for (let key in BOOKS) {
            const b = BOOKS[key];
            const card = document.createElement('div');
            card.className = "book-card";
            card.innerHTML = `
                <div class="book-cover">${b.coverEmoji} ${b.title.slice(0,2)}</div>
                <div class="book-info">
                    <div class="book-title">${b.title}</div>
                    <div class="book-desc">${b.description}</div>
                    <button class="start-btn" data-id="${b.id}">开始互动阅读 →</button>
                </div>
            `;
            grid.appendChild(card);
        }
        document.querySelectorAll('.start-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const book = BOOKS[id];
                if (book) initBookSession(book, false);
            });
        });
    }

    function addGlobalBackLogic() {
        const observer = new MutationObserver(() => {
            const readerDiv = document.getElementById('readerView');
            if (readerDiv && readerDiv.style.display !== 'none') {
                if (!document.getElementById('backToLibraryBtn')) {
                    const header = document.querySelector('.reader-header');
                    if(header) {
                        const backBtn = document.createElement('button');
                        backBtn.id = 'backToLibraryBtn';
                        backBtn.innerText = '← 返回书库';
                        backBtn.style.background = '#eef2f8';
                        backBtn.style.border = 'none';
                        backBtn.style.padding = '6px 14px';
                        backBtn.style.borderRadius = '30px';
                        backBtn.style.cursor = 'pointer';
                        backBtn.onclick = () => {
                            document.getElementById('readerView').style.display = 'none';
                            document.getElementById('libraryView').style.display = 'block';
                        };
                        header.prepend(backBtn);
                    }
                }
            } else {
                const btn = document.getElementById('backToLibraryBtn');
                if(btn) btn.remove();
            }
        });
        observer.observe(document.getElementById('app'), { childList: true, subtree: true });
    }

    renderLibrary();
    addGlobalBackLogic();
    document.getElementById('globalClearBtn')?.addEventListener('click', clearAllSaves);
</script>
